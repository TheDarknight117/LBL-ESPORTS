<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LBL Open Qualifier - Panel Administrativo</title>
    <link rel="stylesheet" href="dist/output.css">
    <style>
        body {
            background-color: #050505;
            color: #e4e4e7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(251, 191, 36, 0.03), transparent 25%),
                radial-gradient(circle at 90% 80%, rgba(251, 191, 36, 0.03), transparent 25%);
        }
        
        .neon-gold-text { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.4); }

        .team-card { background: linear-gradient(145deg, #121214 0%, #09090b 100%); border: 1px solid #27272a; transition: all 0.2s ease; cursor: pointer; }
        .team-card:hover { transform: translateY(-4px); border-color: rgba(251, 191, 36, 0.5); box-shadow: 0 10px 30px -10px rgba(251, 191, 36, 0.15); }

        .tab-active { background-color: rgba(251, 191, 36, 0.1); color: #fbbf24; border-bottom: 2px solid #fbbf24; }
        .tab-inactive { color: #a1a1aa; border-bottom: 2px solid transparent; }
        .tab-inactive:hover { color: #e4e4e7; background-color: rgba(255,255,255,0.02); }

        ::-webkit-scrollbar { width: 6px; height: 6px;}
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #fbbf24; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .tab-content-animate { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    
    <!-- Header Principal (REEMPLAZA EL QUE TIENES POR ESTE) -->
    <header class="max-w-7xl mx-auto mb-10 text-center relative">
        
        <!-- Botón de Navegación -->
        <div class="absolute right-0 top-0 hidden md:block">
            <a href="schedules.html" class="flex items-center gap-2 bg-zinc-900 hover:bg-yellow-500 hover:text-black text-yellow-500 border border-yellow-500/50 px-4 py-2 rounded-lg text-sm font-bold uppercase tracking-widest transition-all shadow-[0_0_10px_rgba(251,191,36,0.1)]">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Generador de Partidos
            </a>
        </div>

        <div class="inline-block border-b border-yellow-500/30 pb-4 mb-6 mt-8 md:mt-0">
            <h1 class="text-4xl md:text-5xl font-black uppercase tracking-widest neon-gold-text mb-2">LBL Open Qualifier</h1>
            <h2 class="text-sm md:text-base text-zinc-400 tracking-[0.2em] uppercase font-semibold">Dashboard de Equipos</h2>
        </div>

        <!-- Botón para móviles -->
        <div class="md:hidden mb-6 flex justify-center">
            <a href="schedules.html" class="flex items-center gap-2 bg-zinc-900 text-yellow-500 border border-yellow-500/50 px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Generador de Partidos
            </a>
        </div>

        <div class="max-w-xl mx-auto relative">
            <input type="text" id="searchInput" placeholder="Buscar equipo, tag, jugador o cuenta de LoL..." class="w-full bg-zinc-900 border border-zinc-700 text-zinc-200 px-5 py-3 rounded-full focus:outline-none focus:border-yellow-500 transition-all shadow-inner">
        </div>
    </header>

    <div id="loader" class="flex justify-center items-center py-20">
        <div class="animate-pulse flex flex-col items-center">
            <div class="w-12 h-12 border-2 border-zinc-700 border-t-yellow-500 rounded-full animate-spin mb-4"></div>
            <p class="text-yellow-500/80 tracking-widest text-sm uppercase font-bold">Sincronizando Base de Datos...</p>
        </div>
    </div>

    <main class="max-w-7xl mx-auto">
        <div id="teams-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden"></div>
        <div id="no-results" class="hidden text-center py-20 text-zinc-500 text-xl">Sin resultados encontrados.</div>
    </main>

    <!-- MODAL DETALLADO -->
    <div id="team-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-2 sm:p-4">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-sm" onclick="closeModal()"></div>
        
        <div class="relative w-full max-w-6xl bg-[#09090b] border border-yellow-500/30 rounded-xl shadow-2xl flex flex-col h-[95vh] md:h-[85vh]">
            <div class="px-6 py-5 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50 rounded-t-xl shrink-0">
                <div class="flex items-center gap-4">
                    <div id="modal-tag" class="w-14 h-14 rounded bg-black border border-yellow-500/50 flex items-center justify-center text-yellow-500 font-black text-xl tracking-widest shadow-[0_0_15px_rgba(251,191,36,0.15)]">TAG</div>
                    <div>
                        <h2 id="modal-title" class="text-2xl md:text-3xl font-black text-white uppercase tracking-wider">Nombre Equipo</h2>
                        <p id="modal-rank" class="text-sm text-yellow-500/80 uppercase tracking-widest font-bold">Rango</p>
                    </div>
                </div>
                <button onclick="closeModal()" class="text-zinc-500 hover:text-yellow-500 transition-colors p-2 bg-zinc-950 border border-zinc-800 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="flex overflow-x-auto border-b border-zinc-800 bg-zinc-900/30 shrink-0 px-2" id="modal-tabs">
                <button onclick="switchTab('general')" id="tab-btn-general" class="tab-active px-6 py-3 font-semibold text-sm uppercase tracking-wider whitespace-nowrap transition-colors">Visión General</button>
                <button onclick="switchTab('roster')" id="tab-btn-roster" class="tab-inactive px-6 py-3 font-semibold text-sm uppercase tracking-wider whitespace-nowrap transition-colors">Roster Titular</button>
                <button onclick="switchTab('suplentes')" id="tab-btn-suplentes" class="tab-inactive px-6 py-3 font-semibold text-sm uppercase tracking-wider whitespace-nowrap transition-colors">Suplentes</button>
                <button onclick="switchTab('disponibilidad')" id="tab-btn-disponibilidad" class="tab-inactive px-6 py-3 font-semibold text-sm uppercase tracking-wider whitespace-nowrap transition-colors">Horarios y Contacto</button>
            </div>

            <div class="p-6 overflow-y-auto flex-grow bg-zinc-950/40 relative">
                <div id="tab-general" class="tab-content-animate space-y-6"></div>
                <div id="tab-roster" class="tab-content-animate hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
                <div id="tab-suplentes" class="tab-content-animate hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
                <div id="tab-disponibilidad" class="tab-content-animate hidden space-y-6"></div>
            </div>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwAHe833PzE8ClNApBiOZB3tZ5JVbog2cqaC3GX7M0jHzzFryTUvjMqwh_J73tUF2J8gQ/exec';
        let globalTeamsData = [];

        async function fetchTeamData() {
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                globalTeamsData = await response.json();
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('teams-grid').classList.remove('hidden');
                renderCards(globalTeamsData);
            } catch (error) {
                document.getElementById('loader').innerHTML = `<p class="text-red-500">Error de conexión.</p>`;
            }
        }

        function getAnswer(team, keyword) {
            const item = team.find(t => t.question.toLowerCase().includes(keyword.toLowerCase()));
            return item && item.answer ? item.answer : null;
        }

        function renderCards(teams) {
            const grid = document.getElementById('teams-grid'); grid.innerHTML = ''; 
            if(teams.length === 0) { grid.classList.add('hidden'); document.getElementById('no-results').classList.remove('hidden'); return; } 
            else { grid.classList.remove('hidden'); document.getElementById('no-results').classList.add('hidden'); }

            teams.forEach((team, index) => {
                const teamName = getAnswer(team, 'Nombre Oficial del equipo') || `Equipo #${index + 1}`;
                const teamTag = getAnswer(team, 'Tag o Abreviación') || 'LBL';
                const capitan = getAnswer(team, 'Nombre completo del representante') || 'N/A';

                const card = document.createElement('div');
                card.className = "team-card rounded-xl p-5 flex flex-col";
                card.onclick = () => openModal(globalTeamsData.indexOf(team));

                card.innerHTML = `
                    <div class="flex items-center gap-4 mb-4 pb-3 border-b border-zinc-800">
                        <div class="w-12 h-12 rounded bg-zinc-950 border border-yellow-500/30 flex items-center justify-center shrink-0">
                            <span class="text-yellow-500 font-black text-sm">${teamTag.substring(0,5)}</span>
                        </div>
                        <div class="overflow-hidden">
                            <h3 class="text-lg font-black text-white uppercase tracking-wide truncate">${teamName}</h3>
                        </div>
                    </div>
                    <div class="flex-grow">
                        <span class="block text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Capitán / Rep</span>
                        <span class="block text-sm text-zinc-300 truncate">${capitan}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function pushPlayer(array, playerObj) { if(playerObj.nombre) array.push({...playerObj}); }

        function openModal(teamIndex) {
            const team = globalTeamsData[teamIndex];
            
            document.getElementById('modal-title').innerText = getAnswer(team, 'Nombre Oficial del equipo') || `Equipo #${teamIndex + 1}`;
            document.getElementById('modal-tag').innerText = (getAnswer(team, 'Tag o Abreviación') || 'TAG').substring(0,5);
            document.getElementById('modal-rank').innerText = getAnswer(team, 'Rango Promedio') || 'Sin Rango Registrado';

            let parsedData = { general: [], roster: [], suplentes: [], disp: [] };
            let context = 'general'; let currentPlayer = {}; let suplenteCount = 0;

            team.forEach(item => {
                let q = item.question; let a = item.answer;
                if(!a || a.toString().trim() === "") return;

                if(q.includes("Nombre del Top Laner")) { context = 'TOP'; currentPlayer = { rol: 'TOP LANER' }; }
                else if(q.includes("Nombre del JUNGLERO")) { pushPlayer(parsedData.roster, currentPlayer); context = 'JUNGLE'; currentPlayer = { rol: 'JUNGLA' }; }
                else if(q.includes("Nombre del MID LANER")) { pushPlayer(parsedData.roster, currentPlayer); context = 'MID'; currentPlayer = { rol: 'MID LANER' }; }
                else if(q.includes("Nombre del ADC")) { pushPlayer(parsedData.roster, currentPlayer); context = 'ADC'; currentPlayer = { rol: 'ADC' }; }
                else if(q.includes("Nombre del SOPORTE")) { pushPlayer(parsedData.roster, currentPlayer); context = 'SUPPORT'; currentPlayer = { rol: 'SOPORTE' }; }
                else if(q === "Nombre del JUGADOR" || (q.includes("Nombre del JUGADOR") && !q.includes("Extranjero"))) { 
                    if(context === 'SUPPORT') pushPlayer(parsedData.roster, currentPlayer); 
                    else if(context.startsWith('SUB')) pushPlayer(parsedData.suplentes, currentPlayer); 
                    suplenteCount++; context = 'SUB' + suplenteCount; currentPlayer = { rol: 'SUPLENTE' };
                }
                else if(q.includes("Disponibilidad") || q.includes("Representante") || q.includes("Plantel") || q.includes("ACEPTACION") || q.includes("COMPROBANTES")) {
                    if(context.startsWith('SUB')) pushPlayer(parsedData.suplentes, currentPlayer);
                    else if (context === 'SUPPORT') pushPlayer(parsedData.roster, currentPlayer);
                    context = 'disp';
                }

                if (['TOP', 'JUNGLE', 'MID', 'ADC', 'SUPPORT'].includes(context) || context.startsWith('SUB')) {
                    // AQUÍ ESTÁ LA CORRECCIÓN: Búsqueda más amplia para el CI
                    if(q === "Nombre del JUGADOR" || q.includes("Nombre del")) currentPlayer.nombre = a;
                    else if(q.includes("Cuenta de LoL") || q.includes("Cuenta PRINCIPAL")) currentPlayer.cuenta = a;
                    else if(q.includes("CI del") || q.startsWith("CI")) currentPlayer.ci = a; // CORREGIDO
                    else if(q.includes("Discord")) currentPlayer.discord = a;
                    else if(q.includes("Whatsapp") || q.includes("contacto")) currentPlayer.whatsapp = a;
                    else if(q.includes("Rango Máximo")) currentPlayer.rango = a;
                    else if(q.includes("op.gg") || q.includes("tracker.gg")) currentPlayer.opgg = a;
                    else if(q.includes("Ciudad") || q.includes("Reside")) currentPlayer.ciudad = a;
                    else if(q.includes("otra Linea") || q.includes("Secundario")) currentPlayer.secundario = a;
                    else currentPlayer[q] = a; 
                } else if (context === 'general') { parsedData.general.push(item); } 
                else if (context === 'disp') { parsedData.disp.push(item); }
            });

            renderTabGeneral(parsedData.general);
            renderTabPlayers(parsedData.roster, 'tab-roster', 'No hay Roster Titular registrado.');
            renderTabPlayers(parsedData.suplentes, 'tab-suplentes', 'El equipo no registró suplentes.');
            renderTabDisp(parsedData.disp);

            switchTab('general');
            document.body.style.overflow = 'hidden';
            document.getElementById('team-modal').classList.remove('hidden');
        }

        function renderTabPlayers(players, elementId, emptyMsg) {
            const container = document.getElementById(elementId); container.innerHTML = '';
            if(players.length === 0) { container.innerHTML = `<div class="col-span-full text-center py-10 text-zinc-500">${emptyMsg}</div>`; return; }

            players.forEach(p => {
                let opggLink = p.opgg ? (p.opgg.startsWith('http') ? p.opgg : 'https://'+p.opgg) : '#';
                let opggBtnHTML = p.opgg 
                    ? `<a href="${opggLink}" target="_blank" class="w-full bg-zinc-950 hover:bg-yellow-500 text-zinc-400 hover:text-black border-t border-zinc-800 py-3 text-xs font-black uppercase tracking-widest transition-all duration-300 flex justify-center items-center gap-2 group-hover:border-yellow-500">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg> Ver Perfil
                       </a>` 
                    : '';

                let mainTitle = p.cuenta || p.nombre || 'Jugador';
                let subTitle = p.cuenta ? p.nombre : '';

                let flexTag = p.secundario && p.secundario.toLowerCase() !== 'no' 
                    ? `<div class="text-right"><span class="text-[8px] text-zinc-500 uppercase tracking-widest block leading-tight">Flex</span><span class="text-[10px] text-yellow-500 font-bold uppercase tracking-widest">${p.secundario}</span></div>` 
                    : '';

                container.innerHTML += `
                    <div class="relative bg-[#0c0c0e] border border-zinc-800 rounded-xl overflow-hidden group hover:border-yellow-500/50 transition-all duration-300 shadow-lg hover:shadow-[0_0_20px_rgba(251,191,36,0.1)] flex flex-col">
                        <div class="h-1 w-full bg-gradient-to-r from-yellow-600 to-yellow-400 opacity-80 group-hover:opacity-100 transition-opacity"></div>
                        <div class="p-5 pb-3">
                            <div class="flex justify-between items-start mb-3">
                                <span class="bg-zinc-900 border border-zinc-700/50 text-white text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-sm shadow-inner flex items-center gap-1.5">
                                    <div class="w-1.5 h-1.5 rounded-full bg-yellow-500"></div> ${p.rol}
                                </span>
                                ${flexTag}
                            </div>
                            <h4 class="text-2xl font-black text-white leading-none truncate" title="${mainTitle}">${mainTitle}</h4>
                            <p class="text-[11px] text-zinc-400 mt-1.5 uppercase tracking-wider truncate font-medium">${subTitle}</p>
                        </div>

                        <div class="px-5 mt-2 flex gap-3">
                            <div class="bg-zinc-900 border border-zinc-800 rounded p-2 flex-1 flex flex-col justify-center items-center">
                                <span class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest mb-0.5">Rank Max</span>
                                <span class="text-xs font-black text-yellow-500 uppercase truncate w-full text-center">${p.rango || 'Unranked'}</span>
                            </div>
                            <div class="bg-zinc-900 border border-zinc-800 rounded p-2 flex-1 flex flex-col justify-center items-center">
                                <span class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest mb-0.5">Región</span>
                                <span class="text-xs font-bold text-white uppercase truncate w-full text-center">${p.ciudad || 'N/A'}</span>
                            </div>
                        </div>

                        <div class="p-5 flex-grow flex flex-col justify-end space-y-3">
                            <div class="flex items-center justify-between border-b border-zinc-800/80 pb-2">
                                <div class="flex items-center gap-2">
                                    <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                                    <span class="text-[11px] text-zinc-400 font-bold uppercase tracking-wider">Discord</span>
                                </div>
                                <span class="text-[11px] text-zinc-200 font-mono bg-zinc-900 px-2 py-0.5 rounded border border-zinc-800">${p.discord || '-'}</span>
                            </div>
                            <div class="flex items-center justify-between border-b border-zinc-800/80 pb-2">
                                <div class="flex items-center gap-2">
                                    <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                                    <span class="text-[11px] text-zinc-400 font-bold uppercase tracking-wider">Móvil</span>
                                </div>
                                <span class="text-[11px] text-zinc-200">${p.whatsapp || '-'}</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-2">
                                    <svg class="w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"></path></svg>
                                    <span class="text-[11px] text-zinc-400 font-bold uppercase tracking-wider">ID (CI)</span>
                                </div>
                                <span class="text-[11px] text-zinc-200">${p.ci || '-'}</span>
                            </div>
                        </div>
                        
                        ${opggBtnHTML}
                    </div>
                `;
            });
        }

        function createLinkButton(url, text) {
            if(!url.includes('http')) return `<span class="text-sm text-zinc-300 break-words">${url}</span>`;
            return `<a href="${url}" target="_blank" class="inline-block bg-zinc-800 hover:bg-yellow-600/20 text-yellow-500 border border-yellow-500/50 px-3 py-1 rounded text-xs font-bold uppercase tracking-widest mt-1 transition-colors">Abrir ${text} ↗</a>`;
        }

        function renderTabGeneral(items) {
            let compHTML = '', perifsHTML = '', legalHTML = '', othersHTML = '';
            items.forEach(item => {
                let q = item.question.toLowerCase(); let a = item.answer;
                let standardBox = `<div class="mb-3 border-b border-zinc-800/50 pb-2"><span class="block text-[10px] text-zinc-500 uppercase tracking-widest font-bold mb-0.5">${item.question}</span><span class="block text-sm text-zinc-200">${a}</span></div>`;
                
                if(q.includes('nivel') || q.includes('rango') || q.includes('extranjero') || q.includes('apertura') || q.includes('invitación')) { compHTML += standardBox; } 
                else if (q.includes('perifericos') || q.includes('periféricos')) {
                    let tipo = q.split('[')[1] ? q.split('[')[1].replace(']', '') : 'Otro';
                    let color = (a.toLowerCase().includes('sí') || a.toLowerCase() === 'si') ? 'text-green-400 border-green-500/30' : 'text-zinc-400 border-zinc-700';
                    perifsHTML += `<span class="inline-block bg-zinc-950 border ${color} px-3 py-1 rounded-full text-xs mr-2 mb-2 uppercase tracking-wide"><b>${tipo}</b>: ${a}</span>`;
                } 
                else if (q.includes('motivo') || q.includes('reglamento') || q.includes('indicaciones')) { legalHTML += standardBox; } 
                else {
                    if(q.includes('logo')) othersHTML += `<div class="mb-3"><span class="block text-[10px] text-zinc-500 uppercase tracking-widest font-bold mb-0.5">${item.question}</span>${createLinkButton(a, 'Logo')}</div>`;
                    else othersHTML += standardBox;
                }
            });

            document.getElementById('tab-general').innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5 shadow-lg"><h3 class="text-yellow-500 font-black uppercase tracking-widest mb-4 flex items-center gap-2 border-b border-zinc-800 pb-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg> Perfil Competitivo</h3>${compHTML || '<p class="text-zinc-500 text-sm">Sin datos</p>'}</div>
                    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5 shadow-lg"><h3 class="text-yellow-500 font-black uppercase tracking-widest mb-4 flex items-center gap-2 border-b border-zinc-800 pb-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> Legal y Acuerdos</h3>${legalHTML || '<p class="text-zinc-500 text-sm">Sin datos</p>'}</div>
                    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5 shadow-lg lg:col-span-2"><h3 class="text-yellow-500 font-black uppercase tracking-widest mb-4 flex items-center gap-2 border-b border-zinc-800 pb-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Interés en Torneo Promocional (Periféricos)</h3><div class="flex flex-wrap mt-2">${perifsHTML || '<p class="text-zinc-500 text-sm">Sin intereses registrados</p>'}</div><div class="mt-4 pt-4 border-t border-zinc-800/50">${othersHTML}</div></div>
                </div>
            `;
        }

        function renderTabDisp(items) {
            let horarios = { Lunes:{}, Martes:{}, Miercoles:{}, Jueves:{}, Viernes:{}, Sábado:{}, Domingo:{} };
            let reps = { rep1: {}, rep2: {} }; let othersHTML = '';

            items.forEach(item => {
                let q = item.question; let a = item.answer;
                if(q.includes("Disponibilidad Horaria") || q.includes("Disponibilidad de Fin de Semana")) {
                    let dayMatch = q.match(/\[(.*?)\]/);
                    if(dayMatch) {
                        let day = dayMatch[1]; if(!horarios[day]) horarios[day] = {};
                        if(q.includes("Inicio")) horarios[day].inicio = a; if(q.includes("termina")) horarios[day].fin = a;
                    }
                } 
                else if (q.includes("Representante") || q.includes("capitán")) {
                    let target = q.includes("Segundo") ? reps.rep2 : reps.rep1;
                    if(q.includes("Nombre")) target.nombre = a;
                    else if(q.includes("celular")) target.whatsapp = a;
                    else if(q.includes("Discord")) target.discord = a;
                    else if(q.includes("Correo")) target.correo = a;
                } 
                else {
                    let isLink = a.includes('http');
                    othersHTML += `<div class="bg-zinc-900 border border-zinc-800 p-4 rounded-lg"><span class="block text-[10px] text-zinc-500 uppercase tracking-widest font-bold mb-1">${q}</span>${isLink ? createLinkButton(a, 'Documento') : `<span class="block text-sm text-zinc-200">${a}</span>`}</div>`;
                }
            });

            let repsHTML = '';
            [reps.rep1, reps.rep2].forEach((rep, idx) => {
                if(rep.nombre) {
                    repsHTML += `<div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 flex flex-col hover:border-yellow-500/30 transition-colors"><span class="text-[10px] text-yellow-500 font-bold uppercase tracking-widest mb-1">${idx===0?'Representante Principal':'Representante Secundario'}</span><span class="text-lg font-bold text-white mb-3">${rep.nombre}</span><div class="text-sm space-y-1 text-zinc-300"><p><span class="text-zinc-500 text-xs w-16 inline-block">Discord:</span> <span class="font-mono bg-zinc-950 px-1 rounded">${rep.discord||'-'}</span></p><p><span class="text-zinc-500 text-xs w-16 inline-block">Móvil:</span> ${rep.whatsapp||'-'}</p>${rep.correo ? `<p><span class="text-zinc-500 text-xs w-16 inline-block">Correo:</span> ${rep.correo}</p>` : ''}</div></div>`;
                }
            });

            let calHTML = '';
            Object.keys(horarios).forEach(day => {
                let d = horarios[day];
                if(d.inicio || d.fin) {
                    calHTML += `<div class="flex items-center justify-between bg-zinc-950 border border-zinc-800/80 p-3 rounded-lg mb-2"><span class="font-bold text-sm text-zinc-300 w-24">${day}</span><div class="flex items-center gap-2 text-sm text-yellow-500"><span class="bg-zinc-900 px-2 py-1 rounded border border-zinc-800">${d.inicio || '?'}</span> <span class="text-zinc-600">-</span> <span class="bg-zinc-900 px-2 py-1 rounded border border-zinc-800">${d.fin || '?'}</span></div></div>`;
                }
            });

            document.getElementById('tab-disponibilidad').innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="space-y-6">
                        <div><h3 class="text-white font-black uppercase tracking-widest mb-3 flex items-center gap-2 border-b border-zinc-800 pb-2"><svg class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg> Administración del Equipo</h3><div class="grid grid-cols-1 gap-4">${repsHTML || '<p class="text-zinc-500">Sin contactos</p>'}</div></div>
                        <div><h3 class="text-white font-black uppercase tracking-widest mb-3 flex items-center gap-2 border-b border-zinc-800 pb-2"><svg class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> Extras / Documentación</h3><div class="grid grid-cols-1 gap-3">${othersHTML || '<p class="text-zinc-500">Sin documentación adicional</p>'}</div></div>
                    </div>
                    <div>
                        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5 shadow-lg sticky top-0"><h3 class="text-yellow-500 font-black uppercase tracking-widest mb-4 flex items-center gap-2 border-b border-zinc-800 pb-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Cronograma de Disponibilidad</h3><div class="flex justify-between px-3 mb-2 text-[10px] text-zinc-500 font-bold uppercase tracking-widest"><span>Día</span><span>Horario de Práctica</span></div>${calHTML || '<p class="text-zinc-500 text-center py-4">No se registraron horarios.</p>'}</div>
                    </div>
                </div>
            `;
        }

        function switchTab(tabId) {
            ['general', 'roster', 'suplentes', 'disponibilidad'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                document.getElementById(`tab-btn-${t}`).className = "tab-inactive px-6 py-3 font-semibold text-sm uppercase tracking-wider whitespace-nowrap transition-colors";
            });
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-btn-${tabId}`).className = "tab-active px-6 py-3 font-semibold text-sm uppercase tracking-wider whitespace-nowrap transition-colors rounded-t-md";
        }

        function closeModal() { document.getElementById('team-modal').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        document.addEventListener('keydown', e => { if (e.key === "Escape") closeModal(); });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            if (!globalTeamsData.length) return;
            const filtered = globalTeamsData.filter(team => team.some(item => item.answer && item.answer.toString().toLowerCase().includes(term)));
            renderCards(filtered);
        });

        fetchTeamData();
    </script>
</body>
</html>
